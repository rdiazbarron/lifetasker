services:
  postgres:
    image: postgres:16-alpine
    container_name: lifetasker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lifetasker
      POSTGRES_USER: lifetasker
      POSTGRES_PASSWORD: lifetasker
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
